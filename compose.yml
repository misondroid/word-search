services:
  app:
    build:
      context: .
      dockerfile: services/app/Dockerfile
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=development
    volumes:
      - ./code/frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev
  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    ports:
      - 3001:3001
    environment:
      - CLOUDFLARE_ACCOUNT_ID=
    volumes:
      - ./code/backend:/app
      - /app/node_modules
    working_dir: /app